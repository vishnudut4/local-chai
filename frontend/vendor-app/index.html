<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chaiwala Vendor Dashboard</title><style>

body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
}

.header{
background:#ff9800;
color:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.stat{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat h2{
margin:0;
color:green;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.menu a{
background:white;
padding:15px;
text-align:center;
text-decoration:none;
color:black;
border-radius:10px;
font-weight:bold;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
background:green;
color:white;
border:none;
padding:10px;
border-radius:5px;
}

</style></head><body><div class="header">
<h2>☕ Chaiwala Vendor Dashboard</h2>
</div><div class="stats"><div class="stat">
  <div class="stat">
<p>Today's Sales ₹</p>
<h2 id="sales">0</h2>
</div>

<div class="stat">
<p>Outstanding Due ₹</p>
<h2 id="due">0</h2>
</div>

<div class="stat">
<p>Customer Count</p>
<h2 id="customers">0</h2>
</div>
<p>Today's Orders</p>
<h2 id="ordersCount">0</h2>
</div><div class="stat">
<p>Today's Cups</p>
<h2 id="cupsCount">0</h2>
</div><div class="stat">
<p>Pending Orders</p>
<h2 id="pendingCount">0</h2>
</div><div class="stat">
<p>Delivered Orders</p>
<h2 id="deliveredCount">0</h2>
</div></div><div class="menu"><a href="ledger.html?vendor=1">
📒 Ledger
</a><a href="qr.html?vendor=1">
📱 QR Code
</a><a href="payments.html?vendor=1">
💰 Payments
</a><a href="register.html">
➕ Add Vendor
</a></div><h3>Recent Orders</h3><div id="orders"></div><script>

const params =
new URLSearchParams(window.location.search);

const vendorId =
params.get('vendor') || 1;

async function loadDashboard(){

const response = await fetch(
'https://local-chai-api.onrender.com/api/vendor/' +
vendorId +
'/orders'
);

const orders = await response.json();

let html='';

let totalOrders=orders.length;
let totalCups=0;
let pending=0;
let delivered=0;

orders.forEach(order=>{

totalCups += Number(order.cups);

if(order.status==='Pending'){
pending++;
}else{
delivered++;
}

html += `
<div class="order">

<h3>${order.customer_name}</h3>

<p>📞 ${order.customer_mobile}</p>

<p>☕ ${order.cups} Cups</p>

<p>Status: ${order.status}</p>

<button onclick="markDelivered(${order.id})">
Delivered
</button>

</div>
`;

});

document.getElementById('orders').innerHTML=html;

document.getElementById('ordersCount').innerText=
totalOrders;

document.getElementById('cupsCount').innerText=
totalCups;

document.getElementById('pendingCount').innerText=
pending;

document.getElementById('deliveredCount').innerText=
delivered;

}

async function markDelivered(orderId){

await fetch(
'https://local-chai-api.onrender.com/api/order/' +
orderId +
'/delivered',
{
method:'PUT'
}
);

loadDashboard();

}

loadDashboard();

setInterval(loadDashboard,5000);

</script></body>
</html>

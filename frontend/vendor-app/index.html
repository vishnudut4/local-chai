<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chaiwala Vendor Dashboard</title><style>

body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
margin:0;
}

.header{
background:#ff9800;
color:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.stat{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
}

.stat h2{
margin:0;
color:green;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

.menu a{
background:white;
padding:15px;
text-align:center;
text-decoration:none;
color:black;
border-radius:10px;
font-weight:bold;
}

.order{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

button{
background:green;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

.logout{
width:100%;
margin-top:10px;
background:red;
}

</style></head><body><div class="header">
<h2>☕ Chaiwala Vendor Dashboard</h2>
</div><div class="stats"><div class="stat">
<p>Today's Orders</p>
<h2 id="ordersCount">0</h2>
</div><div class="stat">
<p>Today's Cups</p>
<h2 id="cupsCount">0</h2>
</div><div class="stat">
<p>Pending Orders</p>
<h2 id="pendingCount">0</h2>
</div><div class="stat">
<p>Delivered Orders</p>
<h2 id="deliveredCount">0</h2>
</div></div><div class="menu"><a id="ledgerLink" href="#">
📒 Ledger
</a><a id="qrLink" href="#">
📱 QR Code
</a><a id="paymentsLink" href="#">
💰 Payments
</a><a href="../vendor-register/">
➕ Add Vendor
</a></div><button class="logout" onclick="logout()">
Logout
</button><h3>Recent Orders</h3><div id="orders"></div><script>

const vendor =
JSON.parse(localStorage.getItem('vendor'));

if(!vendor){

window.location.href =
'../vendor-login/';

}

const vendorId = vendor.id;

document.getElementById('ledgerLink').href =
'ledger.html?vendor=' + vendorId;

document.getElementById('qrLink').href =
'qr.html?vendor=' + vendorId;

document.getElementById('paymentsLink').href =
'payments.html?vendor=' + vendorId;

async function loadDashboard(){

const response = await fetch(
'https://local-chai-api.onrender.com/api/vendor/' +
vendorId +
'/orders'
);

const orders = await response.json();

let html='';

let totalOrders = orders.length;
let totalCups = 0;
let pending = 0;
let delivered = 0;

orders.forEach(order=>{

totalCups += Number(order.cups);

if(order.status === 'Pending'){
pending++;
}else{
delivered++;
}

html += `
<div class="order">

<h3>${order.customer_name}</h3>

<p>📞 ${order.customer_mobile}</p>

<p>☕ ${order.cups} Cups</p>

<p>Status: ${order.status}</p>

<button onclick="markDelivered(${order.id})">
Delivered
</button>

</div>
`;

});

document.getElementById('orders').innerHTML = html;

document.getElementById('ordersCount').innerText =
totalOrders;

document.getElementById('cupsCount').innerText =
totalCups;

document.getElementById('pendingCount').innerText =
pending;

document.getElementById('deliveredCount').innerText =
delivered;

}

async function markDelivered(orderId){

await fetch(
'https://local-chai-api.onrender.com/api/order/' +
orderId +
'/delivered',
{
method:'PUT'
}
);

loadDashboard();

}

function logout(){

localStorage.removeItem('vendor');

window.location.href =
'../vendor-login/';

}

loadDashboard();

setInterval(loadDashboard,5000);

</script></body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vendor Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

button{
padding:10px;
border:none;
background:green;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>☕ Vendor Dashboard</h1>

<div id="orders"></div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const vendorId =
params.get('vendor');

async function loadOrders(){

const response = await fetch(
'https://local-chai-api.onrender.com/api/vendor/' +
vendorId +
'/orders'
);

const orders = await response.json();

let html = '';

orders.forEach(order => {

html += `
<div class="card">

<h3>${order.customer_name}</h3>

<p>📞 ${order.customer_mobile}</p>

<p>☕ Cups: ${order.cups}</p>

<p>Status: ${order.status}</p>

<button onclick="markDelivered(${order.id})">
Delivered
</button>

</div>
`;

});

document.getElementById('orders').innerHTML =
html;

}

async function markDelivered(orderId){

await fetch(
'https://local-chai-api.onrender.com/api/order/' +
orderId +
'/delivered',
{
method:'PUT'
}
);

loadOrders();

}

loadOrders();

setInterval(loadOrders,5000);

</script>

</body>
</html>

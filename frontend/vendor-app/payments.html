<!DOCTYPE html>
<html>
<head>
<title>Payments</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

.card{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
}

input{
padding:10px;
width:120px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
}

</style>

</head>

<body>

<h1>💰 Customer Payments</h1>

<div id="balances"></div>

<script>

const vendorId = 1;

async function loadBalances(){

const response = await fetch(
'https://local-chai-api.onrender.com/api/vendor/' +
vendorId +
'/customer-balances'
);

const balances = await response.json();

let html='';

balances.forEach(customer=>{

html += `
<div class="card">

<h3>${customer.customer_name}</h3>

<p>${customer.customer_mobile}</p>

<p>Outstanding Due ₹${customer.due}</p>

<input
id="amount_${customer.customer_mobile}"
placeholder="Amount">

<button
onclick="receivePayment(
'${customer.customer_name}',
'${customer.customer_mobile}'
)">
Receive
</button>

</div>
`;

});

document.getElementById('balances').innerHTML =
html;

}

async function receivePayment(name,mobile){

const amount =
document.getElementById(
'amount_' + mobile
).value;

await fetch(
'https://local-chai-api.onrender.com/api/payment',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
vendor_id:1,
customer_name:name,
customer_mobile:mobile,
amount:Number(amount)
})
});

alert('Payment Recorded');

loadBalances();

}

loadBalances();

</script>

</body>
</html>

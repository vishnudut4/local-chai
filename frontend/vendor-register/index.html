<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vendor Registration</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.card{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:green;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

#msg{
margin-top:15px;
text-align:center;
font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<h2>Tea Vendor Registration</h2>

<input id="name" placeholder="Vendor Name">

<input id="mobile" placeholder="Mobile Number">

<input id="city" placeholder="City">

<input id="password" type="password" placeholder="Password">

<button onclick="registerVendor()">
Create Account
</button>

<div id="msg"></div>

</div>

<script>

async function registerVendor(){

const name =
document.getElementById('name').value;

const mobile =
document.getElementById('mobile').value;

const city =
document.getElementById('city').value;

const password =
document.getElementById('password').value;

const res = await fetch(
'https://local-chai-api.onrender.com/api/vendor/register',
{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
name,
mobile,
city,
password
})
}
);

const data = await res.json();

document.getElementById('msg').innerHTML =
'Vendor Created Successfully';

console.log(data);

}

</script>

</body>
</html>

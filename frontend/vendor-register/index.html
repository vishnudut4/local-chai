<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Registration - Chaiwala</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .register-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #6f4e37;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a3728;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6f4e37;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6f4e37 0%, #4a3728 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(111, 78, 55, 0.3);
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            color: #6f4e37;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="header">
            <h1>☕ Chaiwala</h1>
            <p>Vendor Registration Portal</p>
        </div>

        <div id="alert"></div>

        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Shop/Business Name *</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" id="mobile" required>
            </div>
            <div class="form-group">
                <label>City *</label>
                <input type="text" id="city" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password *</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Register</button>
        </form>

        <div class="links">
            <p>Already registered? <a href="../vendor-login/">Login here</a></p>
            <p><a href="../">Back to home</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'https://local-chai-api.onrender.com';

        async function handleRegister(e) {
            e.preventDefault();
            const alertDiv = document.getElementById('alert');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                alertDiv.innerHTML = '<div class="alert alert-error">✗ Passwords do not match</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/vendor/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        mobile: document.getElementById('mobile').value,
                        city: document.getElementById('city').value,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alertDiv.innerHTML = '<div class="alert alert-success">✓ Registration successful! Redirecting to login...</div>';
                    setTimeout(() => {
                        window.location.href = '../vendor-login/';
                    }, 2000);
                } else {
                    alertDiv.innerHTML = `<div class="alert alert-error">✗ ${data.error || 'Registration failed'}</div>`;
                }
            } catch (err) {
                alertDiv.innerHTML = `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaiwala - Customer Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #6f4e37 0%, #4a3728 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: white;
            color: #6f4e37;
            border-color: white;
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .section {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .section.active {
            display: block;
            animation: slideIn 0.3s ease-in;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #6f4e37;
            margin-bottom: 25px;
            border-bottom: 3px solid #6f4e37;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a3728;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6f4e37;
            box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #6f4e37 0%, #4a3728 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(111, 78, 55, 0.3);
        }

        .btn-secondary {
            background: #ddd;
            color: #333;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background: #ccc;
        }

        .vendors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .vendor-card {
            background: linear-gradient(135deg, #f9f9f9 0%, #f0f0f0 100%);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #6f4e37;
            cursor: pointer;
            transition: all 0.3s;
        }

        .vendor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(111, 78, 55, 0.2);
        }

        .vendor-card h3 {
            color: #6f4e37;
            margin-bottom: 10px;
        }

        .vendor-card p {
            margin: 8px 0;
            font-size: 14px;
            color: #666;
        }

        .vendor-card .price {
            font-size: 18px;
            font-weight: bold;
            color: #6f4e37;
            margin-top: 15px;
        }

        .order-card {
            background: linear-gradient(135deg, #f9f9f9 0%, #f0f0f0 100%);
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #6f4e37;
            margin-bottom: 15px;
        }

        .order-card.completed {
            border-left-color: #4CAF50;
        }

        .order-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .table th {
            background: #6f4e37;
            color: white;
            padding: 12px;
            text-align: left;
        }

        .table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .table tr:hover {
            background: #f9f9f9;
        }

        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6f4e37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .stat-box {
            background: linear-gradient(135deg, #6f4e37 0%, #4a3728 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stat-box h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .stat-box .value {
            font-size: 32px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 28px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .nav-tabs {
                flex-direction: column;
            }

            .vendors-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☕ Chaiwala Customer Portal</h1>
            <p>Order tea, manage your account and track dues</p>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="showSection('register')">Register</button>
                <button class="tab-btn" onclick="showSection('order')">Place Order</button>
                <button class="tab-btn" onclick="showSection('orders')">My Orders</button>
                <button class="tab-btn" onclick="showSection('dues')">My Dues</button>
            </div>
        </header>

        <!-- Register Section -->
        <div id="register" class="section active">
            <h2>📝 New Customer Registration</h2>
            <div id="registerAlert"></div>
            <form onsubmit="handleRegister(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" id="regName" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile Number *</label>
                        <input type="tel" id="regMobile" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Select Vendor *</label>
                        <select id="regVendor" required>
                            <option value="">-- Choose a vendor --</option>
                        </select>
                    </div>
                </div>
                <button type="submit">Register</button>
            </form>
        </div>

        <!-- Place Order Section -->
        <div id="order" class="section">
            <h2>🍵 Place Order</h2>
            <div id="orderAlert"></div>
            <form onsubmit="handlePlaceOrder(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Your Name *</label>
                        <input type="text" id="orderName" required>
                    </div>
                    <div class="form-group">
                        <label>Your Mobile *</label>
                        <input type="tel" id="orderMobile" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Select Vendor *</label>
                        <select id="orderVendor" required>
                            <option value="">-- Choose a vendor --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Number of Cups *</label>
                        <input type="number" id="orderCups" min="1" max="100" required>
                    </div>
                </div>
                <button type="submit">Place Order</button>
            </form>
        </div>

        <!-- My Orders Section -->
        <div id="orders" class="section">
            <h2>📦 My Orders</h2>
            <div id="ordersAlert"></div>
            <div id="ordersContainer">
                <p style="text-align: center; color: #999;">Enter your mobile number to view orders</p>
                <div class="form-group" style="max-width: 300px;">
                    <label>Mobile Number</label>
                    <input type="tel" id="searchMobile" placeholder="Enter your mobile">
                    <button onclick="loadCustomerOrders()" style="margin-top: 10px; width: 100%;">Search Orders</button>
                </div>
            </div>
        </div>

        <!-- My Dues Section -->
        <div id="dues" class="section">
            <h2>💰 My Dues</h2>
            <div id="duesAlert"></div>
            <div id="duesContainer">
                <p style="text-align: center; color: #999;">Enter your details to check dues</p>
                <div class="form-row" style="max-width: 600px;">
                    <div class="form-group">
                        <label>Vendor</label>
                        <select id="duesVendor">
                            <option value="">-- Select vendor --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Mobile</label>
                        <input type="tel" id="duesMobile" placeholder="Your mobile">
                    </div>
                </div>
                <button onclick="loadDues()" style="margin-top: 10px;">Check Dues</button>
            </div>
            <div id="duesTable" style="margin-top: 30px;"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://local-chai-api.onrender.com';
        let vendors = [];

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            loadVendors();
        });

        async function loadVendors() {
            try {
                const res = await fetch(`${API_URL}/api/vendors`);
                vendors = await res.json();
                populateVendorSelects();
            } catch (err) {
                console.error('Error loading vendors:', err);
            }
        }

        function populateVendorSelects() {
            const selects = ['regVendor', 'orderVendor', 'duesVendor'];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                vendors.forEach(vendor => {
                    const option = document.createElement('option');
                    option.value = vendor.id;
                    option.text = `${vendor.name} - ₹${vendor.price}/cup - ${vendor.city}`;
                    select.appendChild(option);
                });
            });
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function handleRegister(e) {
            e.preventDefault();
            const alertDiv = document.getElementById('registerAlert');
            
            try {
                const response = await fetch(`${API_URL}/api/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vendor_id: document.getElementById('regVendor').value,
                        customer_name: document.getElementById('regName').value,
                        customer_mobile: document.getElementById('regMobile').value,
                        cups: 0
                    })
                });

                if (response.ok) {
                    alertDiv.innerHTML = '<div class="alert alert-success">✓ Registered successfully! You can now place orders.</div>';
                    setTimeout(() => {
                        showSection('order');
                        alertDiv.innerHTML = '';
                    }, 1500);
                } else {
                    alertDiv.innerHTML = '<div class="alert alert-error">✗ Registration failed. Try again.</div>';
                }
            } catch (err) {
                alertDiv.innerHTML = `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }

        async function handlePlaceOrder(e) {
            e.preventDefault();
            const alertDiv = document.getElementById('orderAlert');
            
            try {
                const response = await fetch(`${API_URL}/api/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vendor_id: document.getElementById('orderVendor').value,
                        customer_name: document.getElementById('orderName').value,
                        customer_mobile: document.getElementById('orderMobile').value,
                        cups: document.getElementById('orderCups').value
                    })
                });

                if (response.ok) {
                    const order = await response.json();
                    alertDiv.innerHTML = `<div class="alert alert-success">✓ Order placed! Order ID: ${order.id}</div>`;
                    e.target.reset();
                    setTimeout(() => alertDiv.innerHTML = '', 3000);
                } else {
                    alertDiv.innerHTML = '<div class="alert alert-error">✗ Failed to place order. Try again.</div>';
                }
            } catch (err) {
                alertDiv.innerHTML = `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }

        async function loadCustomerOrders() {
            const mobile = document.getElementById('searchMobile').value;
            if (!mobile) {
                alert('Please enter mobile number');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/orders`);
                const orders = await res.json();
                const customerOrders = orders.filter(o => o.customer_mobile === mobile);
                
                let html = '';
                if (customerOrders.length === 0) {
                    html = '<p style="text-align: center; color: #999; margin-top: 20px;">No orders found</p>';
                } else {
                    customerOrders.forEach(order => {
                        const vendor = vendors.find(v => v.id == order.vendor_id);
                        html += `
                            <div class="order-card ${order.status === 'Delivered' ? 'completed' : ''}">
                                <div style="display: flex; justify-content: space-between; align-items: start;">
                                    <div>
                                        <h3>Order #${order.id}</h3>
                                        <p><strong>Vendor:</strong> ${vendor?.name || 'Unknown'}</p>
                                        <p><strong>Cups:</strong> ${order.cups}</p>
                                        <p><strong>Amount:</strong> ₹${order.cups * vendor?.price}</p>
                                        <p><strong>Date:</strong> ${new Date(order.created_at).toLocaleDateString()}</p>
                                        <span class="order-status ${order.status === 'Pending' ? 'status-pending' : 'status-delivered'}">${order.status}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
                document.getElementById('ordersContainer').innerHTML = html;
            } catch (err) {
                document.getElementById('ordersAlert').innerHTML = `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }

        async function loadDues() {
            const vendorId = document.getElementById('duesVendor').value;
            const mobile = document.getElementById('duesMobile').value;

            if (!vendorId || !mobile) {
                alert('Please select vendor and enter mobile');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/vendor/${vendorId}/customer-balances`);
                const balances = await res.json();
                const customerDue = balances.find(b => b.customer_mobile === mobile);

                let html = '';
                if (!customerDue) {
                    html = '<p style="text-align: center; color: #999;">No dues record found</p>';
                } else {
                    html = `
                        <table class="table">
                            <tr>
                                <th>Name</th>
                                <th>Mobile</th>
                                <th>Due Amount</th>
                            </tr>
                            <tr>
                                <td>${customerDue.customer_name}</td>
                                <td>${customerDue.customer_mobile}</td>
                                <td><strong>₹${customerDue.due}</strong></td>
                            </tr>
                        </table>
                    `;
                }
                document.getElementById('duesTable').innerHTML = html;
            } catch (err) {
                document.getElementById('duesAlert').innerHTML = `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>

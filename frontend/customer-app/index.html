<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chaiwala - Customer</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
}
.vendor{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}
button{
background:#ff9800;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>
<body>

<h1>☕ Nearby Tea Vendors</h1>

<div id="vendorList"></div>

<script>
fetch('../../vendors.json')
.then(r => r.json())
.then(vendors => {

let html = '';

vendors.forEach(vendor => {

html += `
<div class="vendor">
<h3>${vendor.name}</h3>
<p>📍 ${vendor.city}</p>
<p>Tea ₹${vendor.price}</p>

<a href="order.html?vendor=${vendor.id}">
<button>Order Tea</button>
</a>

</div>
`;

});

document.getElementById('vendorList').innerHTML = html;

});
</script>

</body>
</html>

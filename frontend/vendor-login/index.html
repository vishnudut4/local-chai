<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - Chaiwala</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #6f4e37 0%, #4a3728 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #6f4e37;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a3728;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #6f4e37;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #6f4e37 0%, #4a3728 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(111, 78, 55, 0.3);
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            color: #6f4e37;
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>☕ Chaiwala</h1>
            <p>Vendor Login Portal</p>
        </div>

        <div id="alert"></div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Mobile Number *</label>
                <input type="tel" id="mobile" required>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Login</button>
        </form>

        <div class="links">
            <p>New vendor? <a href="../vendor-register/">Register here</a></p>
            <p><a href="../">Back to home</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'https://local-chai-api.onrender.com';

        async function handleLogin(e) {
            e.preventDefault();
            const alertDiv = document.getElementById('alert');
            
            try {
                const response = await fetch(`${API_URL}/api/vendor/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mobile: document.getElementById('mobile').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('vendor', JSON.stringify(data.vendor));
                    alertDiv.innerHTML = '<div class="alert" style="background: #d4edda; color: #155724; border: 1px solid #c3e6cb;">✓ Login successful! Redirecting...</div>';
                    setTimeout(() => {
                        window.location.href = '../vendor-app/';
                    }, 1000);
                } else {
                    alertDiv.innerHTML = '<div class="alert alert-error">✗ ' + data.message + '</div>';
                }
            } catch (err) {
                alertDiv.innerHTML = `<div class="alert alert-error">✗ Error: ${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
